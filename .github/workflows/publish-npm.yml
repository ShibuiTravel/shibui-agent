name: Publish npm Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.event.release.tag_name || inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.repository == 'ShibuiTravel/shibui-agent' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve publish ref
        id: publish-ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.publish-ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Smoke
        run: npm run smoke

      - name: Publish shibui-agent
        run: npm publish --access public
